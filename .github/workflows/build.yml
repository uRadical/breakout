name: build

# Builds self-contained packages for macOS, Windows and Linux. Artifacts are
# attached to every run; pushing a v* tag also publishes a GitHub Release.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # --- Lint: gates the build/package/release jobs below ---------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lint tools
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy
      # Blocking: fails the job (and therefore the whole pipeline) if any source
      # isn't clang-format clean.
      - name: Format check (clang-format)
        run: make format-check
      # SDL3 is fetched for the compile database, but this job never opens a
      # window, so skip its X11/Wayland requirement (those dev libs aren't
      # installed here -- only on the Linux build job).
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DSDL_UNIX_CONSOLE_BUILD=ON
      # Blocking: the pure-maths unit tests must pass before anything is built.
      - name: Unit tests
        run: |
          cmake --build build --target physics_test
          ctest --test-dir build --output-on-failure
      # Reporting only: clang-tidy findings are surfaced in the log but don't
      # block a release yet. Uses the configure above for the compile database.
      - name: Static analysis (clang-tidy)
        continue-on-error: true
        run: clang-tidy -p build src/Main.cpp src/Game.cpp src/Audio.cpp src/Draw.cpp src/Physics.cpp

  # --- macOS: Breakout.app inside a .dmg (SDL3 bundled) ---------------------
  macos:
    needs: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Package (.dmg)
        run: cd build && cpack -C Release
      - uses: actions/upload-artifact@v4
        with:
          name: Breakout-macOS
          path: build/*.dmg

  # --- Windows: breakout.exe + SDL3.dll in a .zip (icon embedded) ----------
  windows:
    needs: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Package (.zip)
        run: cd build && cpack -C Release
      - uses: actions/upload-artifact@v4
        with:
          name: Breakout-Windows
          path: build/*.zip

  # --- Linux: self-contained AppImage (SDL3 bundled) -----------------------
  linux:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxtst-dev libwayland-dev wayland-protocols \
            libxkbcommon-dev libegl1-mesa-dev libgl1-mesa-dev \
            libpulse-dev libasound2-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Install into AppDir
        run: cmake --install build --prefix AppDir/usr
      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          base=https://github.com/linuxdeploy
          # linuxdeploy plus its appimage *output* plugin (not bundled in the
          # main AppImage; without it `--output appimage` fails).
          wget -q $base/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q $base/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-appimage-x86_64.AppImage
          # SDL3 was built by FetchContent; let linuxdeploy find it via ldd.
          export LD_LIBRARY_PATH="$PWD/build/_deps/sdl3-build:$LD_LIBRARY_PATH"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --executable AppDir/usr/bin/breakout \
            --desktop-file AppDir/usr/share/applications/breakout.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/512x512/apps/breakout.png \
            --output appimage
      - uses: actions/upload-artifact@v4
        with:
          name: Breakout-Linux
          path: Breakout*.AppImage

  # --- Publish a GitHub Release when a v* tag is pushed --------------------
  release:
    needs: [macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
